[package]
name = "lightnode-desktop"
version = "0.1.1"
description = "LightNode - one-click LightChain AI worker onboarding"
edition = "2021"
rust-version = "1.77"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.33"

[profile.release]
opt-level = "s"
lto = true
strip = true
