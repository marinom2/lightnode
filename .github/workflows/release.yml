name: Release Desktop

# Builds the desktop app for macOS (universal), Linux, and Windows and attaches
# the installers to a GitHub Release. Triggered by pushing a v* tag, or manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1)"
        required: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Intel + Apple Silicon (universal)
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04 # .deb + .AppImage
            args: ""
          - platform: windows-latest # .msi + .exe
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"

      - name: Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: do NOT define the APPLE_* signing vars here unconditionally.
          # Tauri's macOS bundler treats a defined-but-empty APPLE_CERTIFICATE as
          # "sign me" and then fails on `security import` of an empty cert. To
          # enable signing/notarization, add the env block from docs/RELEASING.md
          # (it is gated so the keys only exist when the secrets are set).
        with:
          projectPath: desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          releaseName: "LightNode __VERSION__"
          releaseBody: "One-click LightChain AI worker onboarding. Download the installer for your OS below."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
